services:
  postgres:
    image: postgres:18.3-trixie
    container_name: bds-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydatabase
    volumes:
      - pg_data:/var/lib/postgresql
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - ./исходные данные:/csv:ro
    networks:
      - bigdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mydatabase"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: bds-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: reports
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: password
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - ch_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - bigdata
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  cassandra:
    image: cassandra:5.0
    container_name: bds-cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: BigDataCluster
      CASSANDRA_DC: dc1
      CASSANDRA_ENDPOINT_SNITCH: SimpleSnitch
    volumes:
      - cass_data:/var/lib/cassandra
    networks:
      - bigdata
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces' 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 10
      start_period: 90s

  spark:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: bds-spark
    ports:
      - "8888:8888"
      - "4040:4040"
      - "4041:4041"
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: spark
      GRANT_SUDO: "yes"
    user: root
    volumes:
      - ./spark:/home/jovyan/work
      - ./spark/jars:/opt/spark-jars
      - ./исходные данные:/home/jovyan/work/csv:ro
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      cassandra:
        condition: service_healthy
    networks:
      - bigdata

volumes:
  pg_data:
  ch_data:
  cass_data:

networks:
  bigdata:
    driver: bridge
